name: Publish Public Pulsar Runtime

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Existing public runtime candidate SHA
        required: true
      target_sha:
        description: New candidate SHA to publish
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish exact runtime image aliases
        run: |
          set -euo pipefail
          source_candidate="${{ inputs.source_sha }}"
          candidate="${{ inputs.target_sha }}"
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          cat > "$RUNNER_TEMP/runtime-images.tsv" <<'EOF'
          backend|4119ca1b3c7971fe9bdbbd1122fae79b37e2c73946e7bd8839e37c3f53bf3a21
          frontend|ac6362146a7e8588d2e3bdefdeca6e7931f28a04ab92a69d470226a4aafce4f0
          comfyui|f57ff654ec00854d3bc364a821ff16b85b17f08e6fe7b96e8be4a44389483b72
          code-agent|11160d01a3d2a717792aaf741601f77feb3677c5c7e07585b9ba21c6fe52f614
          seaweedfs|70883456b269e61fad7fe9f17617a24f9feaacbe87ab2c327ac4e1302471c352
          EOF
          : > "$RUNNER_TEMP/public-runtime-images.env"
          while IFS='|' read -r role digest; do
            source="ghcr.io/$owner/pulsar-runtime-$role:$source_candidate@sha256:$digest"
            target="ghcr.io/$owner/pulsar-runtime-$role:$candidate"
            docker buildx imagetools create --tag "$target" "$source"
            exact="$target@sha256:$digest"
            docker buildx imagetools inspect "$exact" >/dev/null
            env_name="$(printf '%s' "$role" | tr '[:lower:]-' '[:upper:]_')_REF"
            printf '%s=%s\n' "$env_name" "$exact" >> "$RUNNER_TEMP/public-runtime-images.env"
          done < "$RUNNER_TEMP/runtime-images.tsv"
      - name: Prove anonymous pulls
        run: |
          set -euo pipefail
          anonymous_config="$(mktemp -d)"
          trap 'rm -rf "$anonymous_config"' EXIT
          while IFS='=' read -r _ ref; do
            docker --config "$anonymous_config" buildx imagetools inspect "$ref" >/dev/null
          done < "$RUNNER_TEMP/public-runtime-images.env"
      - name: Upload public runtime references
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pulsar-public-runtime-images-${{ inputs.target_sha }}
          path: ${{ runner.temp }}/public-runtime-images.env
          if-no-files-found: error
          retention-days: 30
