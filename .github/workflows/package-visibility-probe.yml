name: Bootstrap Public Pulsar Runtime Packages

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bootstrap public runtime package namespaces
        run: |
          set -euo pipefail
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          docker pull alpine:3.22
          for role in backend frontend comfyui code-agent seaweedfs; do
            target="ghcr.io/$owner/pulsar-runtime-$role:bootstrap"
            docker tag alpine:3.22 "$target"
            docker push "$target"
          done
      - name: Prove anonymous package access
        run: |
          set -euo pipefail
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          anonymous_config="$(mktemp -d)"
          trap 'rm -rf "$anonymous_config"' EXIT
          for role in backend frontend comfyui code-agent seaweedfs; do
            docker --config "$anonymous_config" pull \
              "ghcr.io/$owner/pulsar-runtime-$role:bootstrap"
          done
